name: Deploy GitHub Pages

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      pages: write
      id-token: write
    steps:
      - uses: actions/checkout@v4
        with:
          persist-credentials: false

      - uses: actions/configure-pages@v4

      - uses: actions/upload-pages-artifact@v1
        with:
          path: '.'

      - uses: actions/deploy-pages@v1
